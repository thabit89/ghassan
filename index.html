<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>غسان - مساعد الأدب العُماني</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--blue:#1a4fa8;--blue-dark:#0f3080;--blue-light:#3a6fd8;--orange:#e87c3e;--orange-light:#f5a06e;--orange-pale:#fef0e6;--sand:#fdf6ee;--sand-dark:#e8d5b8;--ink:#1a1a2e;--ink-soft:#3a3a5c;--shadow:rgba(26,79,168,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--sand);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 70%,var(--blue-light) 100%);flex-shrink:0;position:relative;overflow:hidden}
header::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='10' fill='%23ffffff' fill-opacity='0.03'/%3E%3C/svg%3E");pointer-events:none}
.header-inner{display:flex;align-items:center;gap:14px;padding:12px 20px;position:relative;z-index:1}
.logo-wrap{width:44px;height:44px;background:white;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:4px;flex-shrink:0;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.logo-wrap img{width:100%;height:100%;object-fit:contain}
.header-center{flex:1}
.header-center h1{font-family:'Amiri',serif;font-size:20px;color:white;line-height:1.2}
.header-center p{font-size:11px;color:rgba(255,255,255,.75)}
.status-dot{width:7px;height:7px;background:#5dde82;border-radius:50%;display:inline-block;margin-right:4px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.avatar-header{width:46px;height:46px;border-radius:50%;overflow:hidden;border:2px solid var(--orange-light);flex-shrink:0;box-shadow:0 0 0 3px rgba(232,124,62,.25)}
.avatar-header img{width:100%;height:100%;object-fit:cover;object-position:top}
.services-bar{background:white;border-bottom:1px solid var(--sand-dark);padding:8px 14px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.services-bar::-webkit-scrollbar{display:none}
.svc-btn{flex-shrink:0;padding:5px 13px;border-radius:18px;border:1.5px solid var(--sand-dark);background:var(--sand);color:var(--ink-soft);font-family:'Cairo',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.svc-btn:hover,.svc-btn.active{background:var(--blue);color:white;border-color:var(--blue)}
.chat-area{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;scrollbar-color:var(--sand-dark) transparent}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:var(--sand-dark);border-radius:2px}
.welcome-card{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-light) 100%);border-radius:16px;padding:20px;color:white;text-align:center;position:relative;overflow:hidden}
.welcome-card::before{content:'📚';position:absolute;top:-8px;left:-8px;font-size:70px;opacity:.07;transform:rotate(-15deg)}
.welcome-card h2{font-family:'Amiri',serif;font-size:20px;margin-bottom:8px}
.welcome-card p{font-size:12.5px;opacity:.92;line-height:1.75}
.quick-prompts{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px;justify-content:center}
.qp{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:white;padding:6px 12px;border-radius:12px;font-size:12px;cursor:pointer;font-family:'Cairo',sans-serif;transition:background .2s}
.qp:hover{background:rgba(255,255,255,.32)}
.msg-row{display:flex;gap:9px;align-items:flex-end;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-row.user{flex-direction:row-reverse}
.msg-av{width:34px;height:34px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid var(--sand-dark)}
.msg-av img{width:100%;height:100%;object-fit:cover;object-position:top}
.user-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--orange-light));display:flex;align-items:center;justify-content:center;font-size:14px;color:white;flex-shrink:0;border:2px solid var(--orange-light)}
.bubble{max-width:80%;padding:13px 17px;border-radius:18px;font-size:13.5px;line-height:1.95}
.bubble.ghassan{background:white;border:1px solid var(--sand-dark);border-bottom-right-radius:4px;box-shadow:0 2px 10px var(--shadow);color:var(--ink)}
.bubble.user{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-dark) 100%);color:white;border-bottom-left-radius:4px}
.bubble h3{font-size:13px;color:var(--blue);margin:8px 0 5px;font-weight:700;border-bottom:1px solid var(--sand-dark);padding-bottom:4px}
.bubble h3:first-child{margin-top:0}
.bubble ul{padding-right:18px;margin:6px 0}
.bubble ul li{margin-bottom:5px}
.bubble strong{color:var(--blue-dark)}
.bubble em{font-family:'Amiri',serif;color:var(--teal, #1a6b6b);font-style:italic;font-size:15px}
.bubble .note{margin-top:12px;padding:10px 14px;background:var(--orange-pale);border-right:3px solid var(--orange);border-radius:8px;font-size:12.5px;color:var(--ink-soft)}
.bubble .question{margin-top:12px;padding:10px 14px;background:rgba(26,79,168,.06);border-right:3px solid var(--blue-light);border-radius:8px;font-size:13px;color:var(--blue-dark);font-style:italic}
.bubble p{margin-bottom:7px}
.bubble p:last-child{margin-bottom:0}
.typing{display:flex;gap:4px;align-items:center;padding:4px 0}
.typing span{width:7px;height:7px;background:var(--blue-light);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
.time-lbl{font-size:10px;color:#bbb;text-align:center}
.input-area{background:white;border-top:1px solid var(--sand-dark);padding:10px 14px 12px;flex-shrink:0;box-shadow:0 -4px 16px rgba(0,0,0,.05)}
.worker-bar{background:var(--orange-pale);border-bottom:1px solid #f5d5c0;padding:7px 16px;display:flex;gap:8px;align-items:center;flex-shrink:0}
.worker-bar input{flex:1;border:1.5px solid #f5d5c0;border-radius:9px;padding:6px 11px;font-family:'Cairo',sans-serif;font-size:12px;background:white;outline:none;direction:ltr}
.worker-bar input:focus{border-color:var(--orange)}
.worker-bar button{padding:6px 16px;background:var(--blue);color:white;border:none;border-radius:9px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s}
.worker-bar button:hover{background:var(--blue-dark)}
.input-row{display:flex;gap:9px;align-items:flex-end}
textarea{flex:1;border:1.5px solid var(--sand-dark);border-radius:14px;padding:10px 16px;font-family:'Cairo',sans-serif;font-size:13.5px;color:var(--ink);background:var(--sand);resize:none;outline:none;min-height:44px;max-height:120px;transition:border-color .2s,box-shadow .2s;direction:rtl;line-height:1.6}
textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,79,168,.1);background:white}
textarea::placeholder{color:#bbb}
.send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--orange) 0%,var(--orange-light) 100%);border:none;color:white;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,box-shadow .15s;box-shadow:0 3px 12px rgba(232,124,62,.4)}
.send-btn:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(232,124,62,.5)}
.send-btn:active{transform:scale(.95)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.err-bubble{background:#fff3f3;border:1px solid #ffcdd2;border-radius:12px;padding:10px 14px;font-size:13px;color:#c62828}
</style>
</head>

const SYSTEM = "أنت غسان، المرافق الأدبي لمبادرة مدرسة غسان في سلطنة عُمان.\n\n━━━ شخصيتك ━━━\nنبرتك متوازنة: دقيق كالأكاديمي، دافئ كالصديق.\nلا تتكلم كمعلم يُلقي محاضرة، ولا تتحدث بخفة مفرطة.\nأنت مرافق ثقافي يجعل الأدب العُماني قريباً ومحبباً.\n\n━━━ سلوكياتك الثابتة ━━━\n١. اقتراح القراءة: في كل رد مناسب، اقترح عملاً أدبياً عُمانياً واحداً تحديداً مع سبب مقنع.\n   مثال: \"إن أعجبك هذا الموضوع، ستجد في رواية سيدات القمر لجوخة الحارثي عالماً مشابهاً...\"\n٢. السؤال التحفيزي: اختم كل رد بسؤال واحد يدفع الطالب للتفكير، ليس للإجابة الآنية.\n   مثال: \"وأنت، هل تعتقد أن الكاتب نجح في إيصال فكرته؟\"\n٣. ربط الأدب بالحياة: اربط الأفكار الأدبية بمواقف يعيشها الطالب.\n   مثال: \"هذا يشبه ما تشعر به حين تنتقل من حي إلى حي آخر وتفتقد أصدقاءك القدامى...\"\n\n━━━ تكيّفك مع كل مرحلة ━━━\n• ابتدائي (1-4): ألعاب لغوية وأسئلة مفتوحة.\n  مثال: \"هل تعرف معنى كلمة فلج؟ ماذا تتخيل حين تسمعها؟\"\n  اجعل كل فكرة صورة أو لعبة.\n• إعدادي (5-9): اطرح تحدياً فكرياً خفيفاً.\n  مثال: \"لو كنت مكان الشخصية، ماذا كنت ستفعل؟\"\n• ثانوي (10-12): ناقش كصديق أكبر، اعرض وجهات نظر متعددة.\n• جامعي ومهتمون: تحليل أعمق مع توثيق ومصادر.\n• الواجبات: لا تعطِ الإجابة مباشرة - اطرح أسئلة تقود الطالب للوصول بنفسه.\n\n━━━ قواعد لا تُكسر ━━━\n١. لا تختلق عناوين كتب إلا مما هو في قاعدة المعرفة\n٢. عند عدم التأكد: \"هذه المعلومة تحتاج تحققاً، أنصح بمراجعة مجلة نزوى أو الموسوعة العُمانية\"\n٣. لا تخلط بين أول رواية عُمانية (الطائي 1963) وأول رواية لامرأة (الشحي 1999)\n٤. لا تنسج مقتطفات شعرية وتنسبها لشعراء\n\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nقاعدة المعرفة - مصادر موثقة\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n▪ المؤسسات\n- النادي الثقافي (1983م): المنتدى الفكري للندوات النقدية\n- جمعية الكتّاب والأدباء العُمانيين (2006م): نقابة الكتّاب ودعم النشر\n- مجلة نزوى (1994م): رئيس تحريرها سيف الرحبي - الأرشيف الرئيسي للحداثة العُمانية\n- منصة أثير / إذاعة عُمان: برنامج \"كتابات\" - منبر مسموع\n- قناة النادي الثقافي على يوتيوب: أرشيف مرئي للقاءات الأدباء\n\n▪ أولويات تاريخية (لا تخلط بينها)\n- أول رواية عُمانية: \"ملائكة الجبل الأخضر\" لعبدالله الطائي (1963م)\n- أول رواية عُمانية لامرأة: \"الطواف حيث الجمر\" لبدرية الشحي (1999م)\n- أول عربية تفوز بالبوكر الدولية: جوخة الحارثي (2019م)\n- أول عُماني يفوز بالبوكر العربية: زهران القاسمي (2023م)\n\n▪ عبدالله الطائي (1924-1973م)\nرواية وشعر - رواية \"ملائكة الجبل الأخضر\" (1963م) أول رواية عُمانية\nمثقف بنّاء للدولة، ناقد أدبي، تناول: الاغتراب والهمّ الوطني\n\n▪ بدرية الشحي\nرواية \"الطواف حيث الجمر\" (1999م) - أول روائية عُمانية\nتتناول: تحدي المحظورات الاجتماعية وقضايا الهوية\n\n▪ سيف الرحبي\nشعر النثر والمقالة - رئيس تحرير مجلة نزوى\nأعمال موثقة: \"الجبل الأخضر\"، \"رأس المسافر\"\nيربط الأدب العُماني بالحداثة العالمية\n\n▪ جوخة الحارثي (مواليد 1978م)\nمان بوكر الدولية 2019 - رواية \"سيدات القمر\" (2010م، تُرجمت 2018)\nدكتوراه في الأدب العربي القديم من جامعة إدنبرة\nالرواية: ثلاثة أجيال، العبودية، التحولات الاجتماعية - الزمن الدائري لا الخطي\n\n▪ زهران القاسمي\nالبوكر العربية 2023م - رواية \"تغريبة القافر\"\nمحاور الرواية: البيئة العُمانية، الأفلاج، الواقعية الأسطورية\n\n▪ سليمان المعمري (مواليد يناير 1974م، ولاية صحم)\nمجموعتان: \"ربما لأنه رجل مهزوم\" (2000م)، \"الأشياء أقرب مما تبدو في المرآة\" (2005م)\nجائزة يوسف إدريس 2007م - رئيس الجمعية 2008م - أسلوبه: السخرية الهادئة\n\n▪ محمود الرحبي\nقصة \"السمكة المشتاقة\" موثقة - مجموعات: \"طريق المسحور\"، \"لماذا لا تمزح معي؟\"\nيوظّف التراث الشعبي في القصة الحديثة\n\n▪ عبدالعزيز الفارسي\nمجموعتان ساخرتان: \"المارّون بشظاياهم\"، \"الدب استيقظ أخيراً\"\n\n▪ هدى حمد\nروائية ومحررة في مجلة نزوى، كاتبة مقالات، محكّمة في مسابقات أدبية\n\n▪ عبدالله حبيب\nقصة قصيرة جداً ونقد سينمائي - أعمال: \"قصة البحر\"، \"ليلامي\"\nمثقف ناقد، يمزج السينما بالسرد\n\n▪ بشاير السليمي\nقصة قصيرة جداً - \"شبابيك زيانة\" - التفاصيل اليومية الهامشية\n\n▪ أمل السعدي\nشعر ونصوص مفتوحة - \"تلك التي لا تحبها\" - جيل ما بعد الحداثة\n\n▪ بشرى خلفان\nمن أبرز أصوات القصة القصيرة والرواية العُمانية المعاصرة\n\n▪ رحمة المغيزوي\n\"كاثية بنت الشيخ\"، \"كتاب الأحلام\" - توظيف التراث الشعبي\n\n▪ محمد عيد العريمي\nرواية \"أثر القيد\" - السجن والهوية والشخصية الإنسانية\nكتاب \"طعم الصبر\" عن تجربته مع الإعاقة\n\n▪ تاريخ الأدب العُماني\n- الشعر: مسيطر تاريخياً - \"تحت كل صخرة في عُمان شاعر\"\n- الرواية: بدأت متأخرة، انتعشت بعد 2000م، ازدهرت بعد البوكر\n- القصة القصيرة: الفن الأكثر تطوراً في الأدب العُماني\n\n▪ مصادر للتحقق والاستزادة\nمجلة نزوى، الموسوعة العُمانية، أرشيف جائزة السلطان قابوس\nقناة النادي الثقافي على يوتيوب، منصة أثير";
const SVC_HINTS = {"general": "أجب بنبرة متوازنة بين الدقة والدفء. اربط الفكرة بالحياة، واختم بسؤال تحفيزي واحد.", "author": "قدّم الأديب كشخصية حية لها قصة، ليس مجرد بيانات. اذكر ما يجعله مميزاً، واقترح عملاً للبدء به.", "analysis": "حلّل البنية والأسلوب والصور البلاغية والمضمون. اربط التحليل بتجربة القارئ. اختم بسؤال يفتح تفكيره.", "review": "نظّم المراجعة: مقدمة تشويقية ← ملخص ← تحليل أسلوبي ← رأي نقدي مبرر ← خاتمة وتوصية للقارئ.", "homework": "لا تعطِ الإجابة مباشرة. اطرح ثلاثة أسئلة تقود الطالب للتفكير بنفسه، ثم أرشده تدريجياً.", "poetry": "اجعل تحليل القصيدة رحلة: ابدأ بالانطباع الأول، ثم الصور، ثم الإيقاع، ثم المعنى العميق. اسأل الطالب رأيه."};
const SVC_PLACEHOLDERS = {"general": "اسألني عن الأدب العُماني...", "author": "من هو الأديب الذي تريد اكتشافه؟", "analysis": "الصق النص أو القصيدة هنا...", "review": "أخبرني عن العمل الأدبي...", "homework": "ما هو سؤالك أو واجبك؟", "poetry": "الصق القصيدة هنا..."};
let workerUrl = localStorage.getItem('ghassan_worker') || '';
let svc = 'general', history = [], busy = false;

if (workerUrl) {
  document.getElementById('workerUrl').value = workerUrl;
  document.getElementById('workerBar').style.background = '#e8f5e9';
  enableInput();
}
function saveWorker() {
  const v = document.getElementById('workerUrl').value.trim();
  if (!v.startsWith('http')) { alert('أدخل رابطاً صحيحاً'); return; }
  workerUrl = v; localStorage.setItem('ghassan_worker', workerUrl);
  document.getElementById('workerBar').style.background = '#e8f5e9';
  enableInput();
  addSystemMsg('✅ تم الربط! غسان 4.0 جاهز للرحلة الأدبية 📚');
}
function enableInput() {
  document.getElementById('msgInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput').placeholder = 'اسألني، اكتشف، ناقش...';
}
function setSvc(btn, s) {
  document.querySelectorAll('.svc-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); svc = s;
  const inp = document.getElementById('msgInput');
  if (!inp.disabled) inp.placeholder = SVC_PLACEHOLDERS[s] || 'اسألني...';
}
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function sendQ(t) {
  if (!workerUrl) { alert('اربط الـ Worker أولاً'); return; }
  document.getElementById('msgInput').value = t; sendMsg();
}
async function sendMsg() {
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text || busy || !workerUrl) return;
  inp.value = ''; inp.style.height = 'auto';
  addUserBubble(text); history.push({ role: 'user', content: text });
  const typEl = addTyping(); busy = true;
  document.getElementById('sendBtn').disabled = true;
  try {
    const system = SYSTEM + (SVC_HINTS[svc] ? '\n\nتعليمات هذا الوضع: ' + SVC_HINTS[svc] : '');
    const reply = await callWorker(system, history);
    typEl.remove(); addGhassanBubble(reply);
    history.push({ role: 'assistant', content: reply });
    if (history.length > 24) history = history.slice(-24);
  } catch(err) { typEl.remove(); addError(err.message); }
  busy = false; document.getElementById('sendBtn').disabled = false; inp.focus();
}
async function callWorker(system, messages) {
  const res = await fetch(workerUrl, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system, messages })
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || 'خطأ في الاتصال بالخادم'); }
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || 'خطأ من Claude');
  return data.content?.[0]?.text || 'لم أتمكن من الرد، حاول مجدداً.';
}
function addUserBubble(t) {
  document.getElementById('chatArea').innerHTML +=
    `<div class="msg-row user"><div class="user-av">أ</div><div class="bubble user">${esc(t)}</div></div>`;
  scroll();
}
function addGhassanBubble(t) {
  document.getElementById('chatArea').innerHTML +=
    `<div class="msg-row"><div class="msg-av"><img src="${AVATAR}" alt="غسان"></div><div class="bubble ghassan">${fmt(t)}</div></div>`;
  scroll();
}
function addSystemMsg(t) {
  document.getElementById('chatArea').innerHTML += `<div class="time-lbl">${esc(t)}</div>`; scroll();
}
function addTyping() {
  const c = document.getElementById('chatArea');
  const el = document.createElement('div'); el.className = 'msg-row';
  el.innerHTML = `<div class="msg-av"><img src="${AVATAR}" alt="غسان"></div><div class="bubble ghassan"><div class="typing"><span></span><span></span><span></span></div></div>`;
  c.appendChild(el); scroll(); return el;
}
function addError(t) {
  document.getElementById('chatArea').innerHTML += `<div class="err-bubble">⚠️ ${esc(t)}</div>`; scroll();
}
function scroll() { const c = document.getElementById('chatArea'); setTimeout(() => c.scrollTop = c.scrollHeight, 50); }
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(t) {
  let h = esc(t);
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/^###?\s*(.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/━+[^\n]*━+/g, m => `<h3>${m.replace(/━/g,'').trim()}</h3>`);
  h = h.replace(/^[-•▪]\s+(.+)$/gm, '<li>$1</li>');
  h = h.replace(/❓\s*(.+)/g, '<div class="question">❓ $1</div>');
  h = h.replace(/💡\s*(.+)/g, '<div class="note">💡 $1</div>');
  h = h.replace(/📚\s*(.+)/g, '<div class="note">📚 $1</div>');
  h = h.replace(/&gt;\s*(.+)/g, '<div class="note">$1</div>');
  h = h.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  return '<p>' + h + '</p>';
}
